description = "Genera la tarjeta de propuesta final de una User Story para Azure DevOps a partir de múltiples insumos."
prompt = """
Analiza los archivos en la ruta proporcionada: {{args}}

1. Lee y consolida todos los archivos de texto/markdown dentro de la carpeta especificada.
2. Utiliza el prompt maestro: @Prompts/Prompt-Propuesta-UserStory.md.
3. El resultado debe seguir las 3 secciones: Título, Descripción y Criterios de Aceptación.
4. Genera el nombre del archivo de salida siguiendo la convención: `YYYYMMDD.TópicoPrincipal.US.md`.
5. Propón la ruta de guardado (por defecto `OutputStaging/` dentro de la carpeta del tópico o según el protocolo de almacenamiento).
"""
